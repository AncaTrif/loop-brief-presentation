  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

cing:0.12em;\" style-hover=\"background:#382E8F;\">GDPR &amp; EU AI Act Quiz<\u002Fa>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fnav>\n\n    <sc-if value=\"{{ mobileMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border-top:3px solid #2C2280; background:#2C2280; display:flex; flex-direction:column; padding:8px 32px 24px;\">\n        <a href=\"https://ancatrif.com/#about\" style=\"color:#E9E70C; text-decoration:none; padding:16px 0; border-bottom:1px solid #443A9C; font-family:'JetBrains Mono',monospace; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.1em;\">About<\u002Fa>\n        <a href=\"https://ancatrif.com/#projects\" style=\"color:#E9E70C; text-decoration:none; padding:16px 0; border-bottom:1px solid #443A9C; font-family:'JetBrains Mono',monospace; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.1em;\">Projects<\u002Fa>\n        <div style=\"padding:16px 0 4px; color:#9B93D6; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; border-bottom:1px solid #443A9C;\">Use Cases<\u002Fdiv>\n        <a href=\"https://ancatrif.com/a3-tool/\" style=\"color:#E9E70C; text-decoration:none; padding:14px 0 14px 16px; border-bottom:1px solid #443A9C; font-family:'JetBrains Mono',monospace; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.1em;\">Product and Engineering<\u002Fa>\n        <a href=\"https://ancatrif.com/hr-agent/\" style=\"color:#E9E70C; text-decoration:none; padding:14px 0 14px 16px; border-bottom:1px solid #443A9C; font-family:'JetBrains Mono',monospace; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.1em;\">People and Culture<\u002Fa>\n        <a href=\"https://loop-brief-presentation.onrender.com/\" style=\"color:#E9E70C; text-decoration:none; padding:14px 0 14px 16px; border-bottom:1px solid #443A9C; font-family:'JetBrains Mono',monospace; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.1em;\">Cross-Team Collaboration<\u002Fa>\n        <div style=\"padding:16px 0 4px; color:#9B93D6; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; border-bottom:1px solid #443A9C;\">Learning Tools<\u002Fdiv>\n        <a href=\"https://gdpr-quiz.ancatrif.com/\" target=\"_blank\" rel=\"noopener\" style=\"color:#E9E70C; text-decoration:none; padding:14px 0 14px 16px; font-family:'JetBrains Mono',monospace; font-weight:500; font-size:13px; text-transform:uppercase; letter-spacing:0.1em;\">GDPR &amp; EU AI Act Quiz<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <div style=\"max-width:900px; margin:0 auto; padding:0 32px;\">\n\n    <!-- BACK LINK -->\n    <div style=\"padding-top:40px;\">\n      <a href=\"https://ancatrif.com/#projects\" style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; text-decoration:none; color:#382E8F; display:inline-flex; align-items:center; gap:8px;\" style-hover=\"color:#2C2280;\">← Back to portfolio<\u002Fa>\n    <\u002Fdiv>\n\n    <!-- HERO -->\n    <div style=\"padding:40px 0 56px; border-bottom:3px solid #2C2280;\">\n      <h1 style=\"font-family:'Archivo',sans-serif; font-weight:900; font-size:clamp(26px,4vw,42px); line-height:1.05; letter-spacing:-0.02em; margin:0 0 24px;\">Loop Brief Agent<\u002Fh1>\n      <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:28px;\">\n        <sc-for list=\"{{ tags }}\" as=\"tag\" hint-placeholder-count=\"5\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; background:#E9E70C; color:#2C2280; padding:8px 18px; border-radius:999px;\">{{ tag }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"font-family:'Archivo',sans-serif; font-weight:400; font-size:18px; line-height:1.6; max-width:56ch; margin:0 0 32px; color:#2C2280;\">A tool that reads a team's scattered updates: Jira tickets, Confluence retro updates, Slack messages, and writes a short brief for their weekly sync. A human reviews and edits before anything goes out.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:16px; margin-bottom:32px;\">\n        <a href=\"https://ancatrif.com/loop-brief/\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'Archivo',sans-serif; font-size:16px; font-weight:700; background:#2C2280; color:#FAFAF2; text-decoration:none; padding:16px 30px; border:3px solid #2C2280; border-radius:999px; display:inline-block;\" style-hover=\"background:#382E8F;\">Try the demo →<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"border:3px solid #2C2280; padding:28px 32px; background:#FFFFFF;\">\n        <p style=\"font-family:'Archivo',sans-serif; font-size:16px; line-height:1.6; margin:0; color:#2C2280;\"><strong>This is a demo with fictional data.<\u002Fstrong> \"Loopline\" and its three teams are made up. The point is to test the mechanism, not represent a real company.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ACCORDION SECTIONS -->\n    <div style=\"padding:40px 0; display:flex; flex-direction:column; gap:24px;\">\n      <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"6\">\n        <div style=\"border:3px solid #2C2280;\">\n          <div sc-camel-on-click=\"{{ sec.toggle }}\" style=\"padding:28px 32px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:24px; background:#E9E70C;\">\n            <h2 style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; letter-spacing:0.04em; text-transform:uppercase; margin:0; color:#2C2280;\">{{ sec.title }}<\u002Fh2>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#2C2280; flex-shrink:0; transition:transform 0.2s;\">▼<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ sec.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <sc-if value=\"{{ sec.isArchitecture }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:32px; font-family:'Archivo',sans-serif; font-size:17px; line-height:1.7; color:#2C2280; background:#FFFFFF; border-top:3px solid #2C2280;\">\n\n                <p style=\"margin:0 0 28px;\">Every brief answers five standing questions: what's blocked, what's risky, what's overdue, what's decided, what's coming next. Across the team's roughly 40 stored updates, each question retrieves the most relevant chunks. Since the same chunk can genuinely answer more than one question, that's up to 30 chunks with overlap, 23 unique ones once duplicates are removed. Claude reads all of them and drafts the brief: one lead item, a watch list, an FYI list, each sentence linked back to its source. A facilitator reviews it in a simple screen, editing any line, checking a citation's origin, adding a steering note, then approving. Only that approved, possibly edited version is the real output, sent by email to whoever needs it.<\u002Fp>\n\n                <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#6E6A8C; margin-bottom:16px;\">The big picture<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; margin-bottom:36px;\">\n                  <sc-for list=\"{{ systemSteps }}\" as=\"node\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex; flex-direction:column;\">\n                      <div style=\"border:2px solid #2C2280; background:{{ node.bg }}; padding:16px 20px;\">\n                        <div style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:14px; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:6px;\">{{ node.title }}<\u002Fdiv>\n                        <div style=\"font-family:'Archivo',sans-serif; font-size:16px; line-height:1.5;\">{{ node.desc }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <sc-if value=\"{{ node.showArrow }}\" hint-placeholder-val=\"{{ true }}\">\n                        <div style=\"margin-left:17px; font-family:'JetBrains Mono',monospace; color:#6E6A8C; font-size:16px; padding:6px 0;\">↓<\u002Fdiv>\n                      <\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n\n                <div style=\"margin-bottom:28px;\">\n                  <img src=\"132f1ab3-4646-4bef-8cd8-4ee71eb248ff\" alt=\"n8n workflow canvas: generate brief pipeline\" style=\"width:100%; height:auto; border:3px solid #2C2280; display:block;\">\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:#6E6A8C; margin-top:10px;\">n8n canvas — brief generation chain<\u002Fdiv>\n                <\u002Fdiv>\n\n                <div>\n                  <img src=\"bcb416a4-5535-41aa-8d54-8dead967cc2f\" alt=\"n8n workflow canvas: approve and send email pipeline\" style=\"width:100%; height:auto; border:3px solid #2C2280; display:block;\">\n                  <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:#6E6A8C; margin-top:10px;\">n8n canvas — approve &amp; send chain<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ sec.isChoices }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:32px; font-family:'Archivo',sans-serif; font-size:17px; line-height:1.7; color:#2C2280; background:#FFFFFF; border-top:3px solid #2C2280;\">\n                <sc-for list=\"{{ designChoices }}\" as=\"choice\" hint-placeholder-count=\"7\">\n                  <sc-if value=\"{{ choice.hasLead }}\" hint-placeholder-val=\"{{ false }}\">\n                    <p style=\"margin:0 0 20px;\"><strong>{{ choice.lead }}<\u002Fstrong> {{ choice.text }}<\u002Fp>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ choice.noLead }}\" hint-placeholder-val=\"{{ true }}\">\n                    <p style=\"margin:0 0 20px;\">{{ choice.text }}<\u002Fp>\n                  <\u002Fsc-if>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ sec.isDefault }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:32px; font-family:'Archivo',sans-serif; font-size:17px; line-height:1.7; color:#2C2280; background:#FFFFFF; border-top:3px solid #2C2280; white-space:pre-line;\">{{ sec.body }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- MODEL CARD -->\n    <div style=\"padding:0 0 40px;\">\n      <div style=\"border:3px solid #2C2280;\">\n        <div sc-camel-on-click=\"{{ toggleModelCard }}\" style=\"padding:28px 32px; background:#E9E70C; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:24px;\">\n          <h2 style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; letter-spacing:0.04em; text-transform:uppercase; margin:0; color:#2C2280;\">Model card<\u002Fh2>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#2C2280; flex-shrink:0; transition:transform 0.2s;\">▼<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ modelCardOpen }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:32px; background:#FFFFFF; border-top:3px solid #2C2280;\">\n          <p style=\"font-family:'Archivo',sans-serif; font-size:17px; line-height:1.7; margin:0 0 28px; color:#2C2280;\">This workflow runs on <strong>Claude Sonnet 4.6<\u002Fstrong>, built by Anthropic.<\u002Fp>\n          <sc-for list=\"{{ modelCard }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid; grid-template-columns:0.24fr 0.76fr; gap:24px; padding:20px 0; border-top:1px solid #D8D4C0;\">\n              <div style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; color:#6E6A8C;\">{{ row.label }}<\u002Fdiv>\n              <div style=\"font-family:'Archivo',sans-serif; font-size:17px; line-height:1.6; color:#2C2280;\">{{ row.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CREDITS -->\n    <div style=\"padding:0 0 40px;\">\n      <div style=\"border:3px solid #2C2280;\">\n        <div sc-camel-on-click=\"{{ credits.toggle }}\" style=\"padding:28px 32px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:24px; background:#E9E70C;\">\n          <h2 style=\"font-family:'JetBrains Mono',monospace; font-weight:700; font-size:17px; letter-spacing:0.04em; text-transform:uppercase; margin:0; color:#2C2280;\">{{ credits.title }}<\u002Fh2>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#2C2280; flex-shrink:0; transition:transform 0.2s;\">▼<\u002Fspan>\n        <\u002Fdiv>\n        <sc-if value=\"{{ credits.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:32px; font-family:'Archivo',sans-serif; font-size:17px; line-height:1.7; color:#2C2280; background:#FFFFFF; border-top:3px solid #2C2280;\">\n            {{ credits.body }}\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#2C2280; color:#FAFAF2; border-top:3px solid #2C2280; margin-top:40px;\">\n    <div style=\"max-width:1240px; margin:0 auto; padding:40px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;\">\n      <div style=\"font-family:'Archivo',sans-serif; font-weight:700; font-size:16px;\">Anca Trif<\u002Fdiv>\n      <div style=\"display:flex; gap:24px;\">\n        <a href=\"https://www.linkedin.com/in/ancatrif\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#E9E70C; text-decoration:none;\" style-hover=\"color:#FAFAF2;\">LinkedIn ↗<\u002Fa>\n        <a href=\"https://ancatrif.substack.com/\" target=\"_blank\" rel=\"noopener\" style=\"font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:#E9E70C; text-decoration:none;\" style-hover=\"color:#FAFAF2;\">Substack ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { openIndex: 0, modelCardOpen: true, useCasesOpen: false, learningToolsOpen: false, isMobile: (typeof window !== 'undefined' && window.innerWidth < 760), mobileMenuOpen: false };\n\n  componentDidMount() {\n    this._onResize = () => this.updateIsMobile();\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  updateIsMobile() {\n    const isMobile = window.innerWidth < 760;\n    if (isMobile !== this.state.isMobile) {\n      this.setState({ isMobile, mobileMenuOpen: isMobile ? this.state.mobileMenuOpen : false });\n    }\n  }\n\n  renderVals() {\n    const raw = [\n      {\n        title: \"The problem it solves\",\n        body: \"Most organizational challenges happen at Flight Level 2, where teams collaborate and coordinate towards the next product iteration. This tool helps product managers, facilitators, and leaders collect all the relevant information from across various sources (Jira, Confluence, Intercom, Slack, etc.) in order to make decisions for the next sprint.\"\n      },\n      {\n        title: \"Design & tradeoffs\",\n        isChoices: true\n      },\n      {\n        title: \"Architecture in plain language\",\n        body: \"Every brief answers five standing questions: what's blocked, what's risky, what's overdue, what's decided, what's coming next. Across the team's roughly 40 stored updates, each question retrieves the most relevant chunks. Since the same chunk can genuinely answer more than one question, that's up to 30 chunks with overlap, 23 unique ones once duplicates are removed. Claude reads all of them and drafts the brief: one lead item, a watch list, an FYI list, each sentence linked back to its source. A facilitator reviews it in a simple screen, editing any line, checking a citation's origin, adding a steering note, then approving. Only that approved, possibly edited version is the real output, sent by email to whoever needs it.\"\n      },\n      {\n        title: \"What it is not ready for yet\",\n        body: \"Real data sources: right now it reads realistic fixtures, not live Jira, Slack, or Confluence. Login and permissions: one shared workspace today, needed before this touches real teams. A few other production habits are already built in: automated checks that catch regressions, graceful handling when something upstream fails, and a running log of every version, kept out of this summary to keep it readable. Happy to walk through any of it.\"\n      },\n      {\n        title: \"How it would scale\",\n        body: \"The shape doesn't change as it grows, same six steps, whether it's reading 40 pieces of text or 4,000. What changes first: real data connections, then handling more weeks of history at once.\"\n      },\n      {\n        title: \"Reflection\",\n        body: \"The retrieval part was easy to get right. The harder, more interesting problem was the judgment part: teaching the system to pick one most-urgent thing instead of listing everything evenly. That's also the part a human should always get the final say on.\"\n      }\n    ];\n\n    const creditsSection = {\n      title: \"Credits\",\n      body: \"Built with n8n, Supabase, Voyage AI embeddings, and the Anthropic API.\"\n    };\n\n    const sections = raw.map((s, i) => ({\n      title: s.title,\n      body: s.body,\n      isOpen: this.state.openIndex === i,\n      isArchitecture: i === 2,\n      isChoices: !!s.isChoices,\n      isDefault: i !== 2 && !s.isChoices,\n      arrowStyle: this.state.openIndex === i ? \"transform:rotate(180deg);\" : \"transform:rotate(0deg);\",\n      toggle: () => this.setState(st => ({ openIndex: st.openIndex === i ? -1 : i }))\n    }));\n\n    const systemStepsRaw = [\n      { title: \"Visitor\", desc: \"Loads ancatrif.com/loop-brief/. Default view shows an embedded real sample brief instantly, free, no backend. \\\"Try it live\\\" opts into the real pipeline.\", bg: \"#FAFAF2\" },\n      { title: \"Render proxy\", desc: \"A hardened Express proxy hides the n8n URL, locks CORS to ancatrif.com, rate-limits, and validates input before anything reaches the pipeline.\", bg: \"#FAFAF2\" },\n      { title: \"n8n (self-hosted, Hetzner VPS)\", desc: \"Three independent webhook-triggered chains on one canvas: generate brief, approve & send, and log version.\", bg: \"#FAFAF2\" },\n      { title: \"Generate: retrieval + synthesis\", desc: \"5 standing queries embedded (Voyage AI) and matched against Supabase pgvector, de-duplicated to ~23 chunks, then Claude synthesizes the structured brief with citations.\", bg: \"#FAFAF2\" },\n      { title: \"Approve & send\", desc: \"On facilitator approval, a separate n8n chain formats the brief, attaches it as HTML, and sends a real email via Gmail, waiting for genuine send confirmation before responding.\", bg: \"#FAFAF2\" }\n    ];\n    const systemSteps = systemStepsRaw.map((s, i) => ({ ...s, showArrow: i < systemStepsRaw.length - 1 }));\n\n    const designChoices = [\n      { lead: null, text: \"I chose to keep two things separate on purpose: finding relevant information is mechanical and should behave the same way every time. Deciding what matters most is judgment, and that's where the model's real work happens.\" },\n      { lead: \"Retrieval today, RAG in mind for scale.\", text: \"I built retrieval as live calls to Confluence, Jira, Slack, and Intercom, scoped to the sprint, since freshness matters more than depth of history right now. RAG is the natural next step as the corpus grows across sprints and document types; this PoC is built with that path in mind, not because current scope strictly needs it yet.\" },\n      { lead: \"Judgment is nudgeable, not retrained.\", text: \"A short note (\\\"watch the Relay delay\\\") shifts what gets prioritized, with no rebuild. Every claim links back to its source, so nothing is asserted without a receipt.\" },\n      { lead: \"Human-in-the-loop by choice, not by gap.\", text: \"The pipeline could run unattended today; that's a config change, not a rebuild. I chose not to enable it. Trust can be phased in instead: review every brief, then spot-check a sample, then review only flagged or contradicting cases, then full automation with exceptions surfaced. Each step is a setting, not a redesign.\" },\n      { lead: \"Approval is the real publish gate.\", text: \"I designed it so what goes out is the facilitator's edited version, never raw model output.\" },\n      { lead: \"Quiet audit trail.\", text: \"Every draft, regenerate, and approve is logged in the background, without interrupting the work.\" }\n    ];\n\n    const modelCard = [\n      { label: \"Good at\", value: \"Picking the single most important thing out of many updates, and citing exactly where each claim came from.\" },\n      { label: \"Watch out for\", value: \"It only knows what it's given. If a source is missing, it won't notice the gap.\" },\n      { label: \"Your role\", value: \"Nothing publishes until a human reviews and approves it.\" },\n      { label: \"Data\", value: \"All inputs are fictional. No real company data is used.\" }\n    ];\n\n    const credits = {\n      title: creditsSection.title,\n      body: creditsSection.body,\n      isOpen: this.state.openIndex === \"credits\",\n      arrowStyle: this.state.openIndex === \"credits\" ? \"transform:rotate(180deg);\" : \"transform:rotate(0deg);\",\n      toggle: () => this.setState(st => ({ openIndex: st.openIndex === \"credits\" ? -1 : \"credits\" }))\n    };\n\n    const modelCardOpen = this.state.modelCardOpen;\n    const modelCardArrowStyle = modelCardOpen ? \"transform:rotate(180deg);\" : \"transform:rotate(0deg);\";\n    const toggleModelCard = () => this.setState(st => ({ modelCardOpen: !st.modelCardOpen }));\n\n    const tags = [\"AI\", \"RAG\", \"N8N\", \"CLAUDE\", \"2026\"];\n\n    return {\n      sections, systemSteps,\n      designChoices: designChoices.map(c => ({ lead: c.lead, text: c.text, hasLead: !!c.lead, noLead: !c.lead })),\n      modelCard, credits, modelCardOpen, modelCardArrowStyle, toggleModelCard, tags,\n      useCasesOpen: this.state.useCasesOpen,\n      openUseCases: () => this.setState({ useCasesOpen: true }),\n      closeUseCases: () => this.setState({ useCasesOpen: false }),\n      learningToolsOpen: this.state.learningToolsOpen,\n      openLearningTools: () => this.setState({ learningToolsOpen: true }),\n      closeLearningTools: () => this.setState({ learningToolsOpen: false }),\n      isMobile: this.state.isMobile,\n      isDesktop: !this.state.isMobile,\n      mobileMenuOpen: this.state.isMobile && this.state.mobileMenuOpen,\n      toggleMobileMenu: () => this.setState(st => ({ mobileMenuOpen: !st.mobileMenuOpen })),\n      navPadding: this.state.isMobile ? \"20px 20px\" : \"32px\"\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
